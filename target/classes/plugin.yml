name: IventWar
version: 1.0
main: org.Main.iventWar.IventWar
api-version: 1.20
authors: [IventWar Team]
description: Team management with event system and territory zones
commands:
  team:
    description: Main team command
    usage: /team <create|invite|accept|decline|kick|leave|info|desc|color|prefix|transfer|promote|demote>
  my:
    description: Team menu (use /my team)
    usage: /my team
  myteam:
    description: Team menu (alternative)
    usage: /myteam
  tc:
    description: Team chat
    usage: /tc <message>
  topbro:
    description: Secret command
    usage: /topbro
  startevent:
    description: Open event setup menu (OP only)
    usage: /startevent
  startivent:
    description: Alias for /startevent
    usage: /startivent
  closeevent:
    description: Force close active event with reason (OP only)
    usage: /closeEvent <reason>
  createzone:
    description: Create a territory zone (OP only)
    usage: /createzone
  zone:
    description: List and manage zones (OP only)
    usage: /zone
  adminhub:
    description: Open admin panel (OP only)
    usage: /adminhub