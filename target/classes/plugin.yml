name: IventWar
version: 1.0
main: org.Main.iventWar.IventWar
api-version: 1.20
authors: [IventWar Team]
description: Team management plugin with chat and tab integration
commands:
  team:
    description: Main team command
    usage: /team <create|invite|accept|decline|kick|leave|info|desc|color|style|prefix>
  my:
    description: Team menu
    usage: /my team
  myteam:
    description: Team menu (alternative)
    usage: /myteam
  tc:
    description: Team chat
    usage: /tc <message>
  topbro:
    description: Secret command
    usage: /topbro
